services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/payment-webhook-hub:cached
    command: sleep infinity
    ports:
      - "3005:3005"
    networks:
      - external-network
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - PORT=3005
      - LOG_LEVEL=debug

networks:
  external-network:
    name: ${EXTERNAL_NETWORK:-payment-webhook-hub-network}
    external: true
